openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Community & School Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: channels
    description: Community channels
  - name: posts
    description: Community posts
  - name: comments
    description: Post comments
  - name: school
    description: School content
  - name: progress
    description: Learning progress
  - name: admin
    description: Admin operations
  - name: uploads
    description: File uploads
  - name: apps
    description: App catalog

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed

  # Channels
  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List all channels
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"

  /admin/channels:
    post:
      operationId: createChannel
      tags: [channels, admin]
      summary: Create a channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"

  /admin/channels/{channelId}:
    patch:
      operationId: updateChannel
      tags: [channels, admin]
      summary: Update a channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequest"
      responses:
        "200":
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
    delete:
      operationId: deleteChannel
      tags: [channels, admin]
      summary: Delete a channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Channel deleted

  /admin/channels/{channelId}/reorder:
    post:
      operationId: reorderChannel
      tags: [channels, admin]
      summary: Reorder a channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Reordered

  # Posts
  /channels/{channelId}/posts:
    get:
      operationId: listPostsByChannel
      tags: [posts]
      summary: List posts in a channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a post
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /posts/{postId}/pin:
    post:
      operationId: pinPost
      tags: [posts]
      summary: Pin a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pinned

  /posts/{postId}/unpin:
    post:
      operationId: unpinPost
      tags: [posts]
      summary: Unpin a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unpinned

  # Comments
  /posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{commentId}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # School - Browse
  /school/segments:
    get:
      operationId: listSegments
      tags: [school]
      summary: List all segments
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"

  /school/segments/{segmentId}/subsections:
    get:
      operationId: listSubsections
      tags: [school]
      summary: List subsections in a segment
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of subsections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subsection"

  /school/subsections/{subsectionId}/lessons:
    get:
      operationId: listLessons
      tags: [school]
      summary: List lessons in a subsection
      parameters:
        - name: subsectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"

  /school/lessons/{lessonId}:
    get:
      operationId: getLesson
      tags: [school]
      summary: Get a lesson
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  # School - Admin segments
  /admin/school/segments:
    post:
      operationId: createSegment
      tags: [school, admin]
      summary: Create a segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSegmentRequest"
      responses:
        "201":
          description: Segment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /admin/school/segments/{segmentId}:
    patch:
      operationId: updateSegment
      tags: [school, admin]
      summary: Update a segment
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSegmentRequest"
      responses:
        "200":
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
    delete:
      operationId: deleteSegment
      tags: [school, admin]
      summary: Delete a segment
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/school/segments/{segmentId}/reorder:
    post:
      operationId: reorderSegment
      tags: [school, admin]
      summary: Reorder segment
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Reordered

  # School - Admin subsections
  /admin/school/subsections:
    post:
      operationId: createSubsection
      tags: [school, admin]
      summary: Create a subsection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubsectionRequest"
      responses:
        "201":
          description: Subsection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subsection"

  /admin/school/subsections/{subsectionId}:
    patch:
      operationId: updateSubsection
      tags: [school, admin]
      summary: Update a subsection
      parameters:
        - name: subsectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubsectionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subsection"
    delete:
      operationId: deleteSubsection
      tags: [school, admin]
      summary: Delete a subsection
      parameters:
        - name: subsectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/school/subsections/{subsectionId}/reorder:
    post:
      operationId: reorderSubsection
      tags: [school, admin]
      summary: Reorder subsection
      parameters:
        - name: subsectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Reordered

  # School - Admin lessons
  /admin/school/lessons:
    post:
      operationId: createLesson
      tags: [school, admin]
      summary: Create a lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /admin/school/lessons/{lessonId}:
    patch:
      operationId: updateLesson
      tags: [school, admin]
      summary: Update a lesson
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
    delete:
      operationId: deleteLesson
      tags: [school, admin]
      summary: Delete a lesson
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/school/lessons/{lessonId}/reorder:
    post:
      operationId: reorderLesson
      tags: [school, admin]
      summary: Reorder lesson
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Reordered

  # Progress
  /progress/lessons/{lessonId}:
    post:
      operationId: toggleLessonCompletion
      tags: [progress]
      summary: Toggle lesson completion
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleCompletionRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonCompletion"

  /progress/me:
    get:
      operationId: getMyProgress
      tags: [progress]
      summary: Get current user progress rollups
      responses:
        "200":
          description: Progress data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressRollup"

  /admin/progress:
    get:
      operationId: getAdminProgress
      tags: [progress, admin]
      summary: Get all users progress table
      responses:
        "200":
          description: Admin progress table
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProgressRow"

  # Admin Users
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created with temp password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"

  /admin/users/{userId}/reset-password:
    post:
      operationId: resetUserPassword
      tags: [admin]
      summary: Reset user password
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"

  /admin/users/{userId}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [admin]
      summary: Deactivate a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User deactivated

  # Uploads
  /admin/uploads/pdf:
    post:
      operationId: uploadPdf
      tags: [uploads, admin]
      summary: Upload a PDF file (multipart/form-data, field name "file")
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResult"

  /admin/uploads/{uploadId}:
    delete:
      operationId: deleteUpload
      tags: [uploads, admin]
      summary: Delete an upload
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /app-categories:
    get:
      operationId: listAppCategories
      tags: [apps]
      summary: List app categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppCategory"
  /apps:
    get:
      operationId: listApps
      tags: [apps]
      summary: List apps
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
            enum: [submitted, incubating, graduated, retired, rejected]
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Apps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppSummary"
  /apps/{slug}:
    get:
      operationId: getApp
      tags: [apps]
      summary: Get an app by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "404":
          description: Not found
  /admin/apps:
    post:
      operationId: createApp
      tags: [apps, admin]
      summary: Create an app
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
  /admin/apps/{id}:
    patch:
      operationId: updateApp
      tags: [apps, admin]
      summary: Update an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "404":
          description: Not found
    delete:
      operationId: retireApp
      tags: [apps, admin]
      summary: Retire an app
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Retired

  /apps/submit:
    post:
      operationId: submitApp
      tags: [apps]
      summary: Member-submit an app to the Incubator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAppRequest"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
  /apps/{id}/vote:
    post:
      operationId: voteApp
      tags: [apps]
      summary: Cast a vote for an incubating app
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Voted
          content:
            application/json:
              schema:
                type: object
                properties:
                  voteCount: { type: integer }
                  votedByMe: { type: boolean }
        "409": { description: App is not votable }
    delete:
      operationId: unvoteApp
      tags: [apps]
      summary: Retract a vote
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Retracted
          content:
            application/json:
              schema:
                type: object
                properties:
                  voteCount: { type: integer }
                  votedByMe: { type: boolean }
  /admin/apps/{id}/stage:
    post:
      operationId: setAppStage
      tags: [apps, admin]
      summary: Set an app's stage (graduate / reject / incubate)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetStageRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
        "404": { description: Not found }
  /apps/{id}/rating:
    put:
      operationId: rateApp
      tags: [apps]
      summary: Rate a graduated app (upsert — one rating per user per app)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RateAppRequest"
      responses:
        "200":
          description: Rated
          content:
            application/json:
              schema:
                type: object
                properties:
                  avgRating: { type: number, nullable: true }
                  ratingCount: { type: integer }
                  myRating: { type: integer, nullable: true }
        "409": { description: App is not rateable (only graduated apps) }
    delete:
      operationId: unrateApp
      tags: [apps]
      summary: Remove your rating
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  avgRating: { type: number, nullable: true }
                  ratingCount: { type: integer }
                  myRating: { type: integer, nullable: true }
  /admin/apps/{id}/videos:
    post:
      operationId: attachAppVideo
      tags: [apps, admin]
      summary: Attach a recording to an app
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachVideoRequest"
      responses:
        "201":
          description: Attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppDetail"
  /admin/apps/{id}/videos/{videoId}:
    delete:
      operationId: detachAppVideo
      tags: [apps, admin]
      summary: Detach a video from an app
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: videoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Detached }
  /apps/{id}/entitlement:
    post:
      operationId: startEntitlement
      tags: [apps]
      summary: Record intent to provision a provisioned app (GHL owns the card + billing)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Entitlement started (pending until the provider confirms)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppEntitlement"
components:
  schemas:
    SubmitAppRequest:
      type: object
      required: [name, categoryId, externalUrl]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        tagline:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        externalUrl:
          type: string
    SetStageRequest:
      type: object
      required: [stage]
      properties:
        stage:
          type: string
          enum: [submitted, incubating, graduated, rejected, retired]

    AppReview:
      type: object
